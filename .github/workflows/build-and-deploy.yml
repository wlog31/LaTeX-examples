# ──────────────────────────────────────────────────────────────────────────────
# build-and-deploy.yml
#
# .tex / .pdf / .svg 는 로컬에서 컴파일 후 커밋해두고,
# 이 워크플로는 manifest 생성 + GitHub Pages 배포만 담당합니다.
#
# 【로컬 작업 흐름】
#   1. xelatex <name>.tex         → <name>.pdf
#   2. pdf2svg <name>.pdf <name>.svg
#   3. git add *.tex *.pdf *.svg && git push
#
# 【최초 1회 설정】
#   GitHub 저장소 > Settings > Pages > Source 를 "GitHub Actions" 로 변경
# ──────────────────────────────────────────────────────────────────────────────
name: Build LaTeX & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 매니페스트 생성 (Python 표준 라이브러리만 사용) ──────────────────
      - name: Generate files.json
        run: python3 generate_manifest.py

      # ── _site/ 구성 ────────────────────────────────────────────────────────
      - name: Prepare _site
        run: |
          mkdir -p _site

          cp index.html _site/
          cp files.json _site/

          for folder in tikz graphics documents preambles; do
            mkdir -p "_site/$folder"
            find "$folder" -maxdepth 1 \
              \( -name "*.tex" -o -name "*.pdf" -o -name "*.svg" \) \
              -exec cp {} "_site/$folder/" \; 2>/dev/null || true
          done

          echo "──── _site 구조 ────"
          find _site -type f | sort

      # ── Pages 아티팩트 업로드 ──────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── 2. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

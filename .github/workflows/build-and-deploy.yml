# ──────────────────────────────────────────────────────────────────────────────
# build-and-deploy.yml
#
# 외부 Action(uses:)을 전혀 사용하지 않음 — git 명령만으로 checkout + 배포
#
# 【최초 1회 설정】
#   GitHub 저장소 > Settings > Pages > Source
#   → "Deploy from a branch" 선택
#   → Branch: gh-pages / root 선택 후 저장
#
# 【로컬 작업 흐름】
#   1. xelatex <name>.tex  →  <name>.pdf
#   2. pdf2svg <name>.pdf <name>.svg
#   3. git add *.tex *.pdf *.svg && git push
# ──────────────────────────────────────────────────────────────────────────────
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # gh-pages 브랜치에 push하기 위해 필요

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 소스 체크아웃 (actions/checkout 대신 git clone 직접 사용) ──────────
      - name: Checkout
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            repo

      # ── files.json 생성 + _site/ 구성 ──────────────────────────────────────
      - name: Build _site
        run: |
          cd repo
          python3 generate_manifest.py

          mkdir -p _site
          cp index.html _site/
          cp files.json _site/
          [ -f cloudflare-worker.js ] && cp cloudflare-worker.js _site/ || true

          for folder in tikz graphics documents preambles; do
            if [ -d "$folder" ]; then
              mkdir -p "_site/$folder"
              find "$folder" -maxdepth 1 \
                \( -name "*.tex" -o -name "*.pdf" -o -name "*.svg" \) \
                -exec cp {} "_site/$folder/" \; 2>/dev/null || true
            fi
          done

          echo "──── _site 구조 ────"
          find _site -type f | sort

      # ── gh-pages 브랜치에 강제 push (deploy) ───────────────────────────────
      - name: Deploy to gh-pages
        run: |
          cd repo/_site
          git init -b gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add --all
          git commit -m "Deploy from ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaTeX Examples</title>

<!-- highlight.js -->
<link id="hljs-css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/latex.min.js"></script>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* ════════════════════════════════════════
   THEME VARIABLES
════════════════════════════════════════ */
:root {
  /* Dark (default) */
  --bg-app:        #0f172a;
  --bg-header:     #0f172a;
  --bg-sidebar:    #111827;
  --bg-welcome:    #0f172a;
  --bg-actionbar:  #0f172a;
  --border:        #1e293b;
  --text-logo:     #f1f5f9;
  --text-sep:      #334155;
  --text-file:     #64748b;
  --text-muted:    #374151;
  --text-folder:   #6b7280;
  --item-hover:    #1a2234;
  --item-hover-t:  #9ca3af;
  --item-active:   #1c3461;
  --item-active-t: #93c5fd;
  --item-active-b: #3b82f6;
  --sb-empty:      #374151;
  --scrollbar:     #1e293b;
  --drag-bg:       #1e293b;
  --drag-dot:      #334155;
  --ab-sep:        #1e293b;
  --ab-label:      #374151;
  --ab-ghost-bd:   #374151;
  --ab-ghost-t:    #9ca3af;
  --toast-bg:      #1e293b;
  --toast-t:       #e2e8f0;
  --toast-bd:      #334155;
  --wc-title:      #f1f5f9;
  --wc-desc:       #475569;
  --wc-meta:       #374151;
  --gh-color:      #475569;
  --gh-hover:      #94a3b8;
  --badge-v-bg:    #1e3a5f;
  --badge-v-t:     #60a5fa;
  --badge-e-bg:    #1a3a20;
  --badge-e-t:     #4ade80;
  --theme-icon:    '☀️';
}

:root.light {
  /* Light — Claude-inspired */
  --bg-app:        #f9f8f5;
  --bg-header:     #ffffff;
  --bg-sidebar:    #f2f1ee;
  --bg-welcome:    #f9f8f5;
  --bg-actionbar:  #ffffff;
  --border:        #e5e3dd;
  --text-logo:     #1a1a1a;
  --text-sep:      #c8c3bb;
  --text-file:     #8a8a8a;
  --text-muted:    #b0aba2;
  --text-folder:   #888882;
  --item-hover:    #eae8e3;
  --item-hover-t:  #333330;
  --item-active:   #ede8df;
  --item-active-t: #b45309;
  --item-active-b: #d97706;
  --sb-empty:      #b0aba2;
  --scrollbar:     #d8d5ce;
  --drag-bg:       #e5e3dd;
  --drag-dot:      #c8c3bb;
  --ab-sep:        #e5e3dd;
  --ab-label:      #9b9791;
  --ab-ghost-bd:   #d8d5ce;
  --ab-ghost-t:    #5a5754;
  --toast-bg:      #ffffff;
  --toast-t:       #1a1a1a;
  --toast-bd:      #e5e3dd;
  --wc-title:      #1a1a1a;
  --wc-desc:       #6b6b6b;
  --wc-meta:       #9b9791;
  --gh-color:      #9b9791;
  --gh-hover:      #5a5754;
  --badge-v-bg:    #fef3c7;
  --badge-v-t:     #92400e;
  --badge-e-bg:    #d1fae5;
  --badge-e-t:     #065f46;
  --theme-icon:    '🌙';
}

/* ── App shell ── */
#app { display: flex; flex-direction: column; height: 100vh;
  background: var(--bg-app); transition: background 0.2s; }

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
header {
  height: 48px; flex-shrink: 0;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1rem; gap: 10px; z-index: 20;
  transition: background 0.2s, border-color 0.2s;
}
.hd-logo { font-weight: 700; color: var(--text-logo); font-size: 0.95rem; white-space: nowrap; transition: color 0.2s; }
.hd-sep  { color: var(--text-sep); font-size: 1.2rem; transition: color 0.2s; }
.hd-file { color: var(--text-file); font-size: 0.82rem; transition: color 0.2s; }
.hd-mode-badge {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 9999px; transition: background 0.2s, color 0.2s;
}
.hd-mode-badge.view { background: var(--badge-v-bg); color: var(--badge-v-t); }
.hd-mode-badge.edit { background: var(--badge-e-bg); color: var(--badge-e-t); }
.hd-space { flex: 1; }
.hd-btn {
  height: 30px; padding: 0 12px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 0.78rem; font-weight: 600; white-space: nowrap; transition: filter 0.12s;
  display: flex; align-items: center; gap: 5px;
}
.hd-btn:hover { filter: brightness(1.12); }
.hd-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Theme toggle */
.hd-theme {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
  transition: background 0.15s, border-color 0.2s;
  line-height: 1;
}
.hd-theme:hover { background: var(--item-hover); }

/* ════════════════════════════════════════
   BODY
════════════════════════════════════════ */
.body { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--bg-sidebar); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.2s, background 0.2s, border-color 0.2s;
}
.sidebar.hidden { width: 0; border-right: none; }
/* On the home (folder-picker) screen, the sidebar and its toggle aren't shown at all. */
#app.home-mode .sidebar,
#app.home-mode #btn-sidebar-toggle,
#app.home-mode .sidebar-backdrop,
#app.home-mode #btn-preview-toggle { display: none; }
.sb-head {
  padding: 0.6rem 0.9rem;
  font-size: 0.66rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); border-bottom: 1px solid var(--border); flex-shrink: 0;
  transition: color 0.2s, border-color 0.2s;
}
.sb-scroll { overflow-y: auto; flex: 1; }
.sb-scroll::-webkit-scrollbar { width: 4px; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

.folder {
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
  margin-bottom: 4px;
  transition: border-color 0.2s;
}
.folder-divider {
  position: relative;
  height: 2px;
  margin: 14px 0.9rem;
  border-radius: 2px;
  background: linear-gradient(to right,
    transparent 0%,
    #3b82f6 15%,
    #60a5fa 50%,
    #3b82f6 85%,
    transparent 100%);
  box-shadow: 0 0 6px rgba(59, 130, 246, 0.55);
  opacity: 0.85;
}
.folder-divider::before {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 7px; height: 7px; border-radius: 50%;
  background: #60a5fa;
  box-shadow: 0 0 8px rgba(96, 165, 250, 0.9);
  transform: translate(-50%, -50%);
}
.folder > .folder-hdr {
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.02em;
}
.folder-hdr {
  padding: 0.5rem 0.9rem; display: flex; align-items: center; gap: 6px;
  font-size: 0.76rem; font-weight: 600; color: var(--text-folder);
  cursor: pointer; user-select: none; transition: background 0.1s, color 0.1s;
}
.folder-hdr:hover { background: var(--item-hover); color: var(--item-hover-t); }
.folder-arrow { margin-left: auto; font-size: 0.6rem; transition: transform 0.18s; }
.folder.closed .folder-arrow,
.subfolder.closed .folder-arrow { transform: rotate(-90deg); }
.folder.closed .file-list,
.subfolder.closed .file-list { display: none; }
.file-list { list-style: none; }
.subfolder .folder-hdr { font-size: 0.74rem; font-weight: 500; }
.file-item {
  padding: 0.38rem 0.9rem 0.38rem 1.6rem;
  font-size: 0.78rem; color: var(--text-folder);
  display: flex; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.1s; white-space: nowrap; overflow: hidden;
}
.file-item:hover  { background: var(--item-hover); color: var(--item-hover-t); }
.file-item.active {
  background: var(--item-active); color: var(--item-active-t);
  border-left: 2px solid var(--item-active-b); padding-left: calc(1.6rem - 2px);
}
.fi-badges { display: flex; gap: 2px; margin-left: auto; flex-shrink: 0; }
.fi-badge  { font-size: 0.56rem; padding: 1px 3px; border-radius: 2px; font-weight: 700; }
.fi-badge.pdf { background: #7f1d1d; color: #fca5a5; }
.fi-badge.svg { background: #14532d; color: #86efac; }
.sb-empty  { padding: 0.35rem 0.9rem 0.35rem 1.6rem; font-size: 0.72rem; color: var(--sb-empty); font-style: italic; }

/* ════════════════════════════════════════
   SPLIT WORKSPACE
════════════════════════════════════════ */
.workspace { flex: 1; display: flex; overflow: hidden; position: relative; }

.welcome {
  flex: 1; display: flex; align-items: flex-start; justify-content: center;
  text-align: center; padding: 2.5rem 1.5rem; overflow-y: auto;
  background: var(--bg-welcome); transition: background 0.2s;
}
.home-box { width: 100%; max-width: 920px; margin: auto; }
.wc-icon  { font-size: 3rem; margin-bottom: 0.75rem; }
.wc-title { font-size: 1.25rem; font-weight: 600; color: var(--wc-title); margin-bottom: 0.4rem; transition: color 0.2s; }
.wc-desc  { color: var(--wc-desc); font-size: 0.85rem; line-height: 1.6; transition: color 0.2s; }
.wc-meta  { margin-top: 1.5rem; font-size: 0.72rem; color: var(--wc-meta); transition: color 0.2s; }

.home-title-row { margin-bottom: 1.5rem; }

.home-crumb {
  display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
  gap: 4px; margin-bottom: 1.5rem; font-size: 0.8rem;
}
.crumb-item {
  cursor: pointer; color: var(--wc-desc); padding: 3px 8px; border-radius: 6px;
  transition: background 0.12s, color 0.12s; font-weight: 500;
}
.crumb-item:hover { background: var(--item-hover); color: var(--item-hover-t); }
.crumb-sep { color: var(--text-sep); }

.home-grid {
  display: grid; gap: 14px; justify-content: center;
  grid-template-columns: repeat(auto-fit, minmax(150px, 190px));
}
.home-grid-root { grid-template-columns: repeat(auto-fit, minmax(170px, 210px)); }

.home-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 1.4rem 1rem; border-radius: 14px; border: 2px solid var(--border);
  background: var(--bg-sidebar); cursor: pointer; transition: transform 0.15s, filter 0.15s, border-color 0.15s;
  font-family: inherit; color: var(--text-logo);
}
.home-card:hover { transform: translateY(-2px); filter: brightness(1.1); }
.home-card-icon  { font-size: 1.8rem; line-height: 1; }
.home-card-label { font-size: 0.85rem; font-weight: 600; text-align: center; word-break: break-word; }
.home-card-count { font-size: 0.68rem; color: var(--wc-meta); }

.home-card-sm { padding: 0.9rem 0.8rem; gap: 4px; }
.home-card-sm .home-card-icon  { font-size: 1.3rem; }
.home-card-sm .home-card-label { font-size: 0.78rem; font-weight: 500; }
.home-card-file { border-style: dashed; }

.home-empty { text-align: center; color: var(--sb-empty); font-size: 0.85rem; padding: 1.5rem; font-style: italic; }

.panes { flex: 1; display: none; overflow: hidden; }
.panes.visible { display: flex; }

/* Left pane — always dark (code editor) */
.pane-left {
  flex: 0 0 50%; min-width: 200px; max-width: 80%;
  display: flex; flex-direction: column; overflow: hidden;
  background: #282c34; position: relative;
}
.pane-label {
  padding: 0.35rem 0.9rem; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: #21252b; color: #4b5263; border-bottom: 1px solid #181a1f;
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
}
#code-view { flex: 1; overflow: auto; display: block; }
#code-view::-webkit-scrollbar { width: 6px; height: 6px; }
#code-view::-webkit-scrollbar-thumb { background: #3a3f4b; border-radius: 3px; }
#code-view pre { margin: 0; border-radius: 0; min-height: 100%; white-space: pre-wrap; }
#code-view code {
  font-family: 'JetBrains Mono','Fira Code',Consolas,monospace !important;
  font-size: 0.83rem !important; line-height: 1.65 !important;
  white-space: pre-wrap !important; word-break: break-word; overflow-wrap: anywhere;
}

.copy-btn {
  background: transparent; border: 1px solid #3a3f4b; color: #9aa1ad;
  font-size: 0.64rem; font-weight: 700; padding: 3px 9px; border-radius: 5px;
  cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.copy-btn:hover { background: #2c313c; color: #e2e8f0; border-color: #4b5263; }
.copy-btn.copied { color: #4ade80; border-color: #14532d; background: #052e16; }

/* Drag handle */
.drag-handle {
  width: 5px; flex-shrink: 0; cursor: col-resize;
  background: var(--drag-bg); transition: background 0.15s;
  position: relative; z-index: 5;
}
.drag-handle:hover, .drag-handle.dragging { background: #3b82f6; }
.drag-handle::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 3px; height: 30px; border-radius: 2px; background: var(--drag-dot);
}

/* Right pane */
.pane-right {
  flex: 1; min-width: 200px; display: flex; flex-direction: column; overflow: hidden;
  background: #f8fafc; position: relative;
}
#pdf-view { flex: 1; border: none; background: #525659; display: block; }

.pane-right.collapsed,
.drag-handle.collapsed { display: none; }
#btn-preview-toggle.active { background: var(--item-active); border-color: var(--item-active-b); }

/* ════════════════════════════════════════
   ACTION BAR
════════════════════════════════════════ */
.action-bar {
  height: 48px; flex-shrink: 0;
  background: var(--bg-actionbar); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px;
  padding: 0 1rem; overflow-x: auto;
  transition: background 0.2s, border-color 0.2s;
}
.action-bar::-webkit-scrollbar { height: 3px; }
.action-bar::-webkit-scrollbar-thumb { background: var(--scrollbar); }

.ab-sep   { width: 1px; height: 20px; background: var(--ab-sep); flex-shrink: 0; margin: 0 2px; }
.ab-label { font-size: 0.72rem; color: var(--ab-label); white-space: nowrap; transition: color 0.2s; }

.ab-btn {
  height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid;
  font-size: 0.76rem; font-weight: 500; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 5px; text-decoration: none;
  transition: filter 0.12s; flex-shrink: 0;
}
.ab-btn:hover:not(:disabled) { filter: brightness(1.12); }
.ab-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

.ab-tex  { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
.ab-pdf  { background: #fff1f2; border-color: #fecaca; color: #b91c1c; }

/* ════════════════════════════════════════
   UTILITIES
════════════════════════════════════════ */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 0.7s linear infinite; }

.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: var(--toast-bg); color: var(--toast-t); border: 1px solid var(--toast-bd);
  padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.82rem;
  z-index: 100; white-space: nowrap; pointer-events: none;
  animation: toast-in 0.2s ease;
}
.toast.err { background: #450a0a; border-color: #7f1d1d; color: #fca5a5; }
.toast.ok  { background: #052e16; border-color: #14532d; color: #86efac; }
@keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(6px); } }

.pane-msg {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; color: #94a3b8; text-align: center; padding: 2rem;
  flex-direction: column; gap: 8px;
}

/* ════════════════════════════════════════
   NARROW SCREENS (phone / tablet portrait)
   Stack panes vertically: PDF preview on top, TeX code below.
════════════════════════════════════════ */
@media (max-width: 768px) {
  .panes.visible {
    flex-direction: column;
  }
  .pane-left, .pane-right {
    flex: 1 1 50% !important;
    max-width: 100% !important;
    min-width: 0;
    width: 100% !important;
  }
  .pane-right { order: -1; }
  .pane-left  { order: 0; }
  .drag-handle { display: none; }

  /* Sidebar becomes an overlay drawer instead of pushing the layout.
     This keeps the code/preview panes at a fixed size while it opens
     and closes, so the PDF view never has to reflow (and go blank). */
  .sidebar {
    position: fixed; top: 48px; left: 0; bottom: 0;
    width: 82%; max-width: 300px;
    z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 4px 0 18px rgba(0, 0, 0, 0.35);
  }
  .sidebar:not(.hidden) { transform: translateX(0); }
  .sidebar.hidden { width: 82%; max-width: 300px; border-right: 1px solid var(--border); }

  .sidebar-backdrop {
    display: none;
    position: fixed; inset: 48px 0 0 0; z-index: 25;
    background: rgba(0, 0, 0, 0.4);
  }
  .sidebar:not(.hidden) ~ .sidebar-backdrop,
  .sidebar:not(.hidden) + .sidebar-backdrop {
    display: block;
  }
}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ HEADER ═══ -->
  <header>
    <button class="hd-theme" id="btn-sidebar-toggle" title="좌측 패널 접기/펼치기">◧</button>
    <button class="hd-theme" id="btn-preview-toggle" title="미리보기 열기/닫기">🖼️</button>
    <span class="hd-logo">📐 LaTeX Examples</span>
    <span class="hd-sep">|</span>
    <span class="hd-file" id="hd-file">파일을 선택하세요</span>
    <span class="hd-mode-badge view" id="hd-badge">보기</span>
    <div class="hd-space"></div>
    <button class="hd-theme" id="btn-theme" title="테마 전환">☀️</button>
    <button class="hd-theme" id="btn-home" title="처음 화면으로">🏠</button>
  </header>

  <!-- ═══ BODY ═══ -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-head">예제 파일</div>
      <div class="sb-scroll" id="sb-content"></div>
    </aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Workspace -->
    <div class="workspace" id="workspace">

      <!-- Welcome / Home browser -->
      <div class="welcome" id="welcome">
        <div class="home-box" id="home-box">
          <div class="home-title-row" id="home-title-row">
            <div class="wc-icon">📐</div>
            <div class="wc-title">LaTeX Examples</div>
            <div class="wc-desc">폴더를 선택하면 하위 폴더와 예제 파일이 표시됩니다.</div>
          </div>
          <div class="home-crumb" id="home-crumb"></div>
          <div class="home-grid" id="home-grid"></div>
          <div class="home-empty" id="home-empty" style="display:none">비어 있음</div>
          <div class="wc-meta" id="wc-meta"></div>
        </div>
      </div>

      <!-- Split panes -->
      <div class="panes" id="panes">

        <!-- Left pane: code -->
        <div class="pane-left" id="pane-left">
          <div class="pane-label">
            <span id="left-label">TeX 코드</span>
            <button class="copy-btn" id="btn-copy" title="TeX 코드 복사">📋 복사</button>
          </div>
          <div id="code-view">
            <pre><code class="language-latex" id="code-el"></code></pre>
          </div>
        </div>

        <!-- Drag handle -->
        <div class="drag-handle" id="drag-handle"></div>

        <!-- Right pane: preview -->
        <div class="pane-right" id="pane-right">
          <div class="pane-label">
            <span id="right-label">미리보기</span>
          </div>
          <iframe id="pdf-view" title="PDF 미리보기"></iframe>
        </div>

      </div><!-- /.panes -->
    </div><!-- /.workspace -->
  </div><!-- /.body -->

  <!-- ═══ ACTION BAR ═══ -->
  <div class="action-bar" id="action-bar">
    <span class="ab-label">예제 보기</span>
    <a class="ab-btn ab-tex hidden" id="ab-dl-tex" href="#" download>⬇ .tex</a>
    <a class="ab-btn ab-pdf hidden" id="ab-dl-pdf" href="#" download>⬇ .pdf</a>
  </div>

</div><!-- /#app -->

<script>
/* ════════════════════════════════════════════════════════════
   THEME
════════════════════════════════════════════════════════════ */
(function () {
  const saved = localStorage.getItem('latex-theme') || 'dark';
  if (saved === 'light') applyLight();

  document.getElementById('btn-theme').addEventListener('click', () => {
    const isLight = document.documentElement.classList.contains('light');
    if (isLight) {
      applyDark();
      localStorage.setItem('latex-theme', 'dark');
    } else {
      applyLight();
      localStorage.setItem('latex-theme', 'light');
    }
  });

  function applyLight() {
    document.documentElement.classList.add('light');
    document.getElementById('btn-theme').textContent = '🌙';
    document.getElementById('hljs-css').href =
      'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css';
    // re-highlight if already rendered
    const codeEl = document.getElementById('code-el');
    if (codeEl && codeEl.textContent && codeEl.textContent.trim()) {
      codeEl.removeAttribute('data-highlighted');
      hljs.highlightElement(codeEl);
    }
  }

  function applyDark() {
    document.documentElement.classList.remove('light');
    document.getElementById('btn-theme').textContent = '☀️';
    document.getElementById('hljs-css').href =
      'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
    const codeEl = document.getElementById('code-el');
    if (codeEl && codeEl.textContent && codeEl.textContent.trim()) {
      codeEl.removeAttribute('data-highlighted');
      hljs.highlightElement(codeEl);
    }
  }
})();

/* ════════════════════════════════════════════════════════════
   SIDEBAR TOGGLE
════════════════════════════════════════════════════════════ */
(function () {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('btn-sidebar-toggle');
  const backdrop = document.getElementById('sidebar-backdrop');
  const saved = localStorage.getItem('latex-sidebar');
  if (saved !== 'visible') setHidden(true);

  btn.addEventListener('click', () => {
    setHidden(!sidebar.classList.contains('hidden'));
  });
  backdrop.addEventListener('click', () => setHidden(true));

  function setHidden(hide) {
    sidebar.classList.toggle('hidden', hide);
    btn.textContent = hide ? '◨' : '◧';
    localStorage.setItem('latex-sidebar', hide ? 'hidden' : 'visible');
    setTimeout(() => { if (typeof refreshPdfView === 'function') refreshPdfView(); }, 250);
  }
})();

/* ════════════════════════════════════════════════════════════
   PREVIEW TOGGLE
════════════════════════════════════════════════════════════ */
(function () {
  const paneRight = document.getElementById('pane-right');
  const paneLeft  = document.getElementById('pane-left');
  const handle    = document.getElementById('drag-handle');
  const btn       = document.getElementById('btn-preview-toggle');
  let savedLeftFlex = '';

  const saved = localStorage.getItem('latex-preview');
  if (saved === 'hidden') setCollapsed(true, true);

  btn.addEventListener('click', () => {
    setCollapsed(!paneRight.classList.contains('collapsed'));
  });

  function setCollapsed(collapse, initial) {
    paneRight.classList.toggle('collapsed', collapse);
    handle.classList.toggle('collapsed', collapse);
    btn.classList.toggle('active', collapse);
    btn.textContent = collapse ? '🖼' : '🖼️';

    if (collapse) {
      savedLeftFlex = paneLeft.style.flex || savedLeftFlex;
      paneLeft.style.flex = '1 1 100%';
    } else {
      paneLeft.style.flex = savedLeftFlex || '';
      if (!initial && typeof refreshPdfView === 'function') {
        setTimeout(refreshPdfView, 250);
      }
    }
    localStorage.setItem('latex-preview', collapse ? 'hidden' : 'visible');
  }
})();

/* ════════════════════════════════════════════════════════════
   HOME BUTTON
════════════════════════════════════════════════════════════ */
document.getElementById('btn-home').addEventListener('click', goHome);

/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let manifest = null;
let current  = null;
let homePath = [];   // [] = root, [folder], [folder, sub, ...]

/* ════════════════════════════════════════════════════════════
   LOAD MANIFEST
════════════════════════════════════════════════════════════ */
async function boot() {
  try {
    const r = await fetch('files.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    manifest = await r.json();
    renderSidebar();
    if (manifest.generated_at) {
      const d = new Date(manifest.generated_at);
      document.getElementById('wc-meta').textContent = `빌드: ${d.toLocaleString('ko-KR')}`;
    }
    renderHome();
  } catch {
    renderHome();
    document.getElementById('wc-meta').innerHTML =
      '<span style="color:#ef4444">⚠ files.json 없음 — CI를 먼저 실행하세요</span>';
    tryGitHubAPI();
  }
}

async function tryGitHubAPI() {
  const h = location.hostname;
  if (!h.endsWith('.github.io')) return;
  const user = h.replace('.github.io', '');
  const repo = location.pathname.split('/').filter(Boolean)[0];
  if (!repo) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${user}/${repo}/git/trees/HEAD?recursive=1`);
    const data = await r.json();
    if (!data.tree) return;
    const FOLDERS = ['tikz', 'documents', 'preambles'];
    const folders = Object.fromEntries(FOLDERS.map(f => [f, []]));
    for (const item of data.tree) {
      const parts = item.path.split('/');
      if (parts.length < 2) continue;
      const folderRaw = parts[0];
      const folder = folderRaw.toLowerCase();
      if (!FOLDERS.includes(folder)) continue;
      const file = parts[parts.length - 1];
      if (!file.endsWith('.tex')) continue;
      const nameOnly = file.slice(0, -4);
      const subParts = parts.slice(1, -1);
      const relName = subParts.length ? `${subParts.join('/')}/${nameOnly}` : nameOnly;
      const basePath = subParts.length ? `${folderRaw}/${subParts.join('/')}` : folderRaw;
      folders[folder].push({
        name: relName, tex: `${basePath}/${nameOnly}.tex`,
        pdf: data.tree.some(t => t.path === `${basePath}/${nameOnly}.pdf`) ? `${basePath}/${nameOnly}.pdf` : null,
        svg: data.tree.some(t => t.path === `${basePath}/${nameOnly}.svg`) ? `${basePath}/${nameOnly}.svg` : null,
      });
    }
    manifest = { folders };
    renderSidebar();
    renderHome();
  } catch { /* silent */ }
}

/* ════════════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════════════ */
const FOLDERS = {
  tikz:      { icon: '✏️', label: 'tikz',      accent: '#8b5cf6' },
  documents: { icon: '📄', label: 'documents', accent: '#3b82f6' },
  preambles: { icon: '📦', label: 'preambles', accent: '#f59e0b' },
};

function idSafe(s) {
  return s.replace(/[^a-zA-Z0-9_-]/g, '_');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

/** Turn a flat list of {name, tex, pdf, svg} (name may contain '/') into a tree. */
function buildTree(files) {
  const root = { sub: {}, leaves: [] };
  for (const f of files) {
    const parts = f.name.split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const p = parts[i];
      node.sub[p] = node.sub[p] || { sub: {}, leaves: [] };
      node = node.sub[p];
    }
    node.leaves.push({ ...f, label: parts[parts.length - 1] });
  }
  return root;
}

/** Render a tree node into nested subfolder / file-item markup. */
function renderTree(node, key, depth) {
  let html = '';
  const subNames = Object.keys(node.sub).sort((a, b) => a.localeCompare(b));
  for (const subName of subNames) {
    const child = node.sub[subName];
    const subId = idSafe(`${key}__${subName}__${depth}__${Math.random().toString(36).slice(2, 7)}`);
    html += `
      <div class="subfolder" id="sub-${subId}">
        <div class="folder-hdr" style="padding-left:${0.9 + depth * 0.5}rem"
             onclick="toggleFolder('${subId}', true)">
          <span>📁</span><span>${escapeHtml(subName)}</span>
          <span class="folder-arrow">▾</span>
        </div>
        <div class="file-list" id="fl-${subId}">
          ${renderTree(child, key, depth + 1)}
        </div>
      </div>`;
  }
  const leaves = node.leaves.slice().sort((a, b) => a.label.localeCompare(b.label));
  for (const f of leaves) {
    const fid = `fi-${key}-${idSafe(f.name)}`;
    html += `
      <div class="file-item" id="${fid}" style="padding-left:${1.6 + depth * 0.5}rem"
           data-folder="${escapeHtml(key)}" data-name="${escapeHtml(f.name)}" onclick="openFileFromEl(this)">
        <span>📄</span>
        <span style="overflow:hidden;text-overflow:ellipsis">${escapeHtml(f.label)}</span>
        <span class="fi-badges">
          ${f.pdf ? '<span class="fi-badge pdf">pdf</span>' : ''}
          ${f.svg ? '<span class="fi-badge svg">svg</span>' : ''}
        </span>
      </div>`;
  }
  if (!subNames.length && !leaves.length && depth === 1) {
    html = `<div class="sb-empty">비어 있음</div>`;
  }
  return html;
}

function renderSidebar() {
  const root = document.getElementById('sb-content');
  root.innerHTML = '';
  const keys = Object.keys(FOLDERS);
  keys.forEach((key, idx) => {
    const meta = FOLDERS[key];
    const files = manifest?.folders?.[key] ?? [];
    const tree = buildTree(files);
    const sec = document.createElement('div');
    sec.className = 'folder'; sec.id = `sec-${key}`;
    sec.style.borderLeftColor = meta.accent;
    sec.innerHTML = `
      <div class="folder-hdr" style="color:${meta.accent}" onclick="toggleFolder('${key}')">
        <span>${meta.icon}</span><span>${meta.label}</span>
        <span class="folder-arrow">▾</span>
      </div>
      <div class="file-list" id="fl-${key}">
        ${renderTree(tree, key, 1)}
      </div>`;
    root.appendChild(sec);
    if (idx < keys.length - 1) {
      const divider = document.createElement('div');
      divider.className = 'folder-divider';
      root.appendChild(divider);
    }
  });
}

function toggleFolder(key, isSub) {
  const id = isSub ? `sub-${key}` : `sec-${key}`;
  document.getElementById(id)?.classList.toggle('closed');
}

/* ════════════════════════════════════════════════════════════
   HOME BROWSER (welcome screen: folders → subfolders → files)
════════════════════════════════════════════════════════════ */
function getNodeAtPath(folder, parts) {
  const files = manifest?.folders?.[folder] ?? [];
  let node = buildTree(files);
  for (const p of parts) {
    if (!node.sub[p]) return null;
    node = node.sub[p];
  }
  return node;
}

function goHome() {
  homePath = [];
  renderHome();
}

function goHomePath(depth) {
  homePath = homePath.slice(0, depth);
  renderHome();
}

function renderHome() {
  current = null;
  document.getElementById('app').classList.add('home-mode');
  document.querySelectorAll('.file-item.active').forEach(el => el.classList.remove('active'));
  document.getElementById('panes').classList.remove('visible');
  document.getElementById('welcome').style.display = 'flex';
  document.getElementById('hd-file').textContent = '파일을 선택하세요';
  const dlTex = document.getElementById('ab-dl-tex');
  const dlPdf = document.getElementById('ab-dl-pdf');
  dlTex.style.display = 'none';
  dlPdf.style.display = 'none';

  const crumbEl = document.getElementById('home-crumb');
  const gridEl  = document.getElementById('home-grid');
  const emptyEl = document.getElementById('home-empty');
  const titleEl = document.getElementById('home-title-row');
  gridEl.innerHTML = '';
  emptyEl.style.display = 'none';

  // breadcrumb
  if (homePath.length) {
    let crumbHtml = `<span class="crumb-item" onclick="goHome()">🏠 처음으로</span>`;
    homePath.forEach((seg, i) => {
      const label = i === 0 ? (FOLDERS[seg]?.label ?? seg) : seg;
      crumbHtml += `<span class="crumb-sep">›</span><span class="crumb-item" onclick="goHomePath(${i + 1})">${escapeHtml(label)}</span>`;
    });
    crumbEl.innerHTML = crumbHtml;
    crumbEl.style.display = 'flex';
  } else {
    crumbEl.innerHTML = '';
    crumbEl.style.display = 'none';
  }
  titleEl.style.display = homePath.length ? 'none' : 'block';

  if (homePath.length === 0) {
    // root: one big button per top-level folder
    gridEl.className = 'home-grid home-grid-root';
    for (const [key, meta] of Object.entries(FOLDERS)) {
      const count = (manifest?.folders?.[key] ?? []).length;
      const btn = document.createElement('button');
      btn.className = 'home-card';
      btn.style.color = meta.accent;
      btn.innerHTML = `
        <span class="home-card-icon">${meta.icon}</span>
        <span class="home-card-label">${escapeHtml(meta.label)}</span>
        <span class="home-card-count">${count}개 파일</span>`;
      btn.onclick = () => { homePath = [key]; renderHome(); };
      gridEl.appendChild(btn);
    }
    return;
  }

  // deeper level: subfolders + files of the current node
  gridEl.className = 'home-grid';
  const folder = homePath[0];
  const node = getNodeAtPath(folder, homePath.slice(1));
  if (!node) { homePath = [folder]; renderHome(); return; }

  const subNames = Object.keys(node.sub).sort((a, b) => a.localeCompare(b));
  const leaves = node.leaves.slice().sort((a, b) => a.label.localeCompare(b.label));

  for (const subName of subNames) {
    const btn = document.createElement('button');
    btn.className = 'home-card home-card-sm';
    btn.innerHTML = `<span class="home-card-icon">📁</span><span class="home-card-label">${escapeHtml(subName)}</span>`;
    btn.onclick = () => { homePath = [...homePath, subName]; renderHome(); };
    gridEl.appendChild(btn);
  }
  for (const f of leaves) {
    const btn = document.createElement('button');
    btn.className = 'home-card home-card-sm home-card-file';
    btn.innerHTML = `
      <span class="home-card-icon">📄</span>
      <span class="home-card-label">${escapeHtml(f.label)}</span>
      <span class="fi-badges">
        ${f.pdf ? '<span class="fi-badge pdf">pdf</span>' : ''}
        ${f.svg ? '<span class="fi-badge svg">svg</span>' : ''}
      </span>`;
    btn.onclick = () => openFile(folder, f.name);
    gridEl.appendChild(btn);
  }
  if (!subNames.length && !leaves.length) {
    emptyEl.style.display = 'block';
  }
}

function openFileFromEl(el) {
  openFile(el.dataset.folder, el.dataset.name);
}

/* ════════════════════════════════════════════════════════════
   OPEN FILE
════════════════════════════════════════════════════════════ */
async function openFile(folder, name) {
  if (!manifest) return;

  const entry = manifest.folders[folder]?.find(f => f.name === name);
  if (!entry) return;
  current = entry;

  document.getElementById('app').classList.remove('home-mode');
  document.querySelectorAll('.file-item.active').forEach(el => el.classList.remove('active'));
  document.getElementById(`fi-${folder}-${idSafe(name)}`)?.classList.add('active');

  document.getElementById('hd-file').textContent = `${folder} / ${name}.tex`;

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('panes').classList.add('visible');

  document.getElementById('left-label').textContent  = 'TeX 코드';
  document.getElementById('right-label').textContent = '미리보기 (PDF)';

  const codeEl = document.getElementById('code-el');
  codeEl.textContent = '불러오는 중…';
  try {
    const text = await fetch(entry.tex).then(r => {
      if (!r.ok) throw new Error(r.status); return r.text();
    });
    codeEl.textContent = text;
    codeEl.removeAttribute('data-highlighted');
    hljs.highlightElement(codeEl);
  } catch {
    codeEl.textContent = '// 파일을 불러올 수 없습니다.';
  }

  if (entry.pdf) {
    document.getElementById('pdf-view').src = buildPdfViewerUrl(entry.pdf);
  } else if (entry.svg) {
    document.getElementById('pdf-view').src = entry.svg;
  } else {
    document.getElementById('pdf-view').src = 'about:blank';
  }

  const dlTex = document.getElementById('ab-dl-tex');
  dlTex.href = entry.tex; dlTex.download = `${name}.tex`;
  dlTex.style.display = 'flex';
  const dlPdf = document.getElementById('ab-dl-pdf');
  if (entry.pdf) {
    dlPdf.href = entry.pdf; dlPdf.download = `${name}.pdf`;
    dlPdf.style.display = 'flex';
  } else dlPdf.style.display = 'none';
}

/* ════════════════════════════════════════════════════════════
   PDF VIEWER URL
   Mobile browsers (notably Android Chrome / in-app browsers)
   often fail to render a PDF embedded directly in an <iframe>.
   Mozilla's PDF.js viewer renders the PDF itself with JS/canvas,
   so it works consistently across desktop and mobile.
════════════════════════════════════════════════════════════ */
function buildPdfViewerUrl(pdfPath) {
  const absoluteUrl = new URL(pdfPath, location.href).href;
  return `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(absoluteUrl)}`;
}

/* ════════════════════════════════════════════════════════════
   PDF LIVE RESIZE
   Force a reload (after resize settles) so the viewer re-fits
   to the new pane size — no need to pick another file.
════════════════════════════════════════════════════════════ */
function refreshPdfView() {
  if (!current || !current.pdf) return;
  const pv = document.getElementById('pdf-view');
  const src = pv.src;
  pv.src = 'about:blank';
  requestAnimationFrame(() => { pv.src = src; });
}

let pdfResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(pdfResizeTimer);
  pdfResizeTimer = setTimeout(refreshPdfView, 200);
});

/* ════════════════════════════════════════════════════════════
   SPLIT PANE DRAG
════════════════════════════════════════════════════════════ */
(function () {
  const handle = document.getElementById('drag-handle');
  const left   = document.getElementById('pane-left');
  let dragging  = false;
  handle.addEventListener('mousedown', e => {
    dragging = true; handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const r = document.getElementById('panes').getBoundingClientRect();
    const pct = Math.max(20, Math.min(78, (e.clientX - r.left) / r.width * 100));
    left.style.flex = '0 0 ' + pct + '%';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    refreshPdfView();
  });
})();

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
let toastTimer;
function toast(msg, type) {
  document.querySelector('.toast')?.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 3200);
}

/* ════════════════════════════════════════════════════════════
   COPY TEX CODE
════════════════════════════════════════════════════════════ */
document.getElementById('btn-copy').addEventListener('click', async () => {
  const codeEl = document.getElementById('code-el');
  const text = codeEl.textContent;
  if (!text || !text.trim() || text === '불러오는 중…') return;
  const btn = document.getElementById('btn-copy');
  try {
    await navigator.clipboard.writeText(text);
    toast('TeX 코드가 복사되었습니다', 'ok');
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = '✅ 복사됨';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1500);
  } catch {
    toast('복사에 실패했습니다', 'err');
  }
});

/* ════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════ */
boot();
</script>
